services:
    php:
        image: php:8.3-cli
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - "8000:8000"
    mysql:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: paysera
            MYSQL_DATABASE: paysera_transfer_db
            MYSQL_USER: paysera
            MYSQL_PASSWORD: paysera123
        ports:
            - "3306:3306"
    redis:
        image: redis:7
        ports:
            - "6379:6379"
